<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset FarmConnect Auth</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .button { padding: 15px 30px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .button.danger { background: #dc3545; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔄 FarmConnect Auth Reset</h1>
    
    <div class="section">
        <h2>Step 1: Clear All Data</h2>
        <p>This will remove all stored authentication data from your browser.</p>
        <button class="button danger" onclick="clearAllData()">Clear All Storage</button>
        <pre id="clear-output">No action taken yet</pre>
    </div>
    
    <div class="section">
        <h2>Step 2: Test Customer Login</h2>
        <p>After clearing data, click here to go to customer login.</p>
        <button class="button" onclick="goToCustomerLogin()">Go to Customer Login</button>
    </div>
    
    <div class="section">
        <h2>Step 3: Current Status</h2>
        <button class="button" onclick="checkStatus()">Check Current Status</button>
        <pre id="status-output">Click "Check Current Status" to see</pre>
    </div>

    <script>
        function clearAllData() {
            // Clear all FarmConnect related data
            localStorage.removeItem('farmconnect-token');
            localStorage.removeItem('farmconnect-user');
            
            // Also clear session storage
            sessionStorage.removeItem('farmconnect-token');
            sessionStorage.removeItem('farmconnect-user');
            
            // Clear any cookies (basic approach)
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            
            document.getElementById('clear-output').innerHTML = '<span class="success">✅ All authentication data cleared!</span>\n\nLocalStorage cleared:\n- farmconnect-token\n- farmconnect-user\n\nSessionStorage cleared:\n- farmconnect-token\n- farmconnect-user\n\nCookies cleared';
            
            // Auto-check status after clearing
            setTimeout(checkStatus, 500);
        }
        
        function checkStatus() {
            const token = localStorage.getItem('farmconnect-token');
            const userStr = localStorage.getItem('farmconnect-user');
            
            let status = '📊 Current Authentication Status:\n\n';
            
            if (token) {
                status += `✅ Token: ${token.substring(0, 30)}...\n\n`;
            } else {
                status += '❌ No token found\n\n';
            }
            
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    status += `✅ User data:\n${JSON.stringify(user, null, 2)}\n\n`;
                    status += `🎯 Current Role: "${user.role}"\n`;
                    status += `🎯 Expected Navigation: ${user.role === 'farmer' ? '/farmer/dashboard' : '/customer/dashboard'}`;
                } catch (e) {
                    status += `❌ Invalid user data: ${userStr}`;
                }
            } else {
                status += '❌ No user data found\n\n';
                status += '👤 You need to login again';
            }
            
            document.getElementById('status-output').textContent = status;
        }
        
        function goToCustomerLogin() {
            // Clear data first, then navigate
            clearAllData();
            setTimeout(() => {
                window.location.href = '/customer/auth';
            }, 1000);
        }
        
        // Auto-check status on page load
        window.onload = function() {
            checkStatus();
        };
    </script>
</body>
</html>
