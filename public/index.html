<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmConnect - Agricultural Marketplace</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
        }
        p {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }
        .btn {
            background: #10b981;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background: #059669;
        }
        .features {
            text-align: left;
            margin: 1.5rem 0;
        }
        .feature {
            padding: 0.5rem 0;
            color: #374151;
        }
        .feature::before {
            content: "✓ ";
            color: #10b981;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 FarmConnect</h1>
        <p>Agricultural Marketplace Platform</p>
        
        <div class="features">
            <div class="feature">Connect Farmers with Customers</div>
            <div class="feature">Buy Fresh Produce Directly</div>
            <div class="feature">Real-time Messaging</div>
            <div class="feature">Secure Payment Processing</div>
            <div class="feature">Multi-language Support</div>
        </div>
        
        <p style="font-size: 0.9rem; color: #9ca3af;">
            This is the deployed version of FarmConnect.<br>
            The full application is running locally.
        </p>
        
        <a href="#" class="btn" onclick="showInfo()">Learn More</a>
    </div>

    <script>
        function showInfo() {
            alert('FarmConnect is a comprehensive agricultural marketplace platform that connects farmers directly with customers. Features include crop listing, real-time messaging, secure payments, and multi-language support.');
        }
    </script>
</body>
</html>
